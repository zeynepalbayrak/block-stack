<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Block Stack</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#F0EDE8}
:root{--sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom)}
#wrap{--bg-top:#F5F2ED;--bg-bot:#E8E4DC;--grid-line:rgba(0,0,0,0.04);--score-color:#1A1A1A;--best-color:rgba(0,0,0,0.3);--perfect-color:#7B5EA7;--combo-color:rgba(123,94,167,0.7);--ov-bg:rgba(245,242,237,0.95);--ov-intro-bg:rgba(245,242,237,0.5);--ov-title:rgba(0,0,0,0.3);--ov-score:#1A1A1A;--ov-sub:rgba(0,0,0,0.4);--btn-bg:rgba(0,0,0,0.07);--btn-border:rgba(0,0,0,0.15);--btn-color:#1A1A1A;--guide-line:rgba(0,0,0,0.07);--floor-tint:rgba(240,237,232,0.6);--ad-bg:rgba(0,0,0,0.05);--ad-border:rgba(0,0,0,0.08);--ad-text:rgba(0,0,0,0.25);--ad-box:rgba(0,0,0,0.06);--ad-box-border:rgba(0,0,0,0.1);--badge-bg:rgba(123,94,167,0.12);--badge-border:rgba(123,94,167,0.35);--badge-color:#5B4FCF}
@media(prefers-color-scheme:dark){
body{background:#080514}
#wrap{--bg-top:#080514;--bg-bot:#0E0A20;--grid-line:rgba(255,255,255,0.025);--score-color:#FFFFFF;--best-color:rgba(255,255,255,0.3);--perfect-color:#FFE566;--combo-color:rgba(255,229,102,0.7);--ov-bg:rgba(8,5,20,0.93);--ov-intro-bg:rgba(8,5,20,0.5);--ov-title:rgba(255,255,255,0.3);--ov-score:#FFFFFF;--ov-sub:rgba(255,255,255,0.4);--btn-bg:rgba(255,255,255,0.1);--btn-border:rgba(255,255,255,0.2);--btn-color:#FFFFFF;--guide-line:rgba(255,255,255,0.06);--floor-tint:rgba(8,5,20,0.55);--ad-bg:rgba(0,0,0,0.4);--ad-border:rgba(255,255,255,0.08);--ad-text:rgba(255,255,255,0.2);--ad-box:rgba(255,255,255,0.06);--ad-box-border:rgba(255,255,255,0.12);--badge-bg:rgba(255,229,102,0.12);--badge-border:rgba(255,229,102,0.35);--badge-color:#FFE566}}

#wrap{position:relative;width:100vw;height:100vh;height:100dvh;user-select:none;overflow:hidden}
#gc{display:block;cursor:pointer;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#scoreEl{position:absolute;top:calc(22px + var(--sat));left:50%;transform:translateX(-50%);font-family:system-ui,-apple-system,sans-serif;font-size:40px;font-weight:600;color:var(--score-color);letter-spacing:-1.5px}
#bestEl{position:absolute;top:calc(68px + var(--sat));left:50%;transform:translateX(-50%);font-family:system-ui,-apple-system,sans-serif;font-size:11px;color:var(--best-color);letter-spacing:1.5px;font-weight:500}
#notifEl{position:absolute;top:calc(108px + var(--sat));left:50%;transform:translateX(-50%);font-family:system-ui,-apple-system,sans-serif;font-size:13px;font-weight:700;letter-spacing:2.5px;opacity:0;transition:opacity .12s;white-space:nowrap;text-align:center}
#comboEl{position:absolute;top:calc(130px + var(--sat));left:50%;transform:translateX(-50%);font-family:system-ui,-apple-system,sans-serif;font-size:11px;font-weight:500;opacity:0;letter-spacing:1px;color:var(--combo-color)}
#burstEl{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .15s}
#burstTitle{font-family:system-ui,-apple-system,sans-serif;font-size:22px;font-weight:700;color:#FF9900;letter-spacing:1px;text-shadow:0 0 24px rgba(255,180,0,0.5)}
#burstSub{font-family:system-ui,-apple-system,sans-serif;font-size:12px;color:rgba(255,160,0,0.75);letter-spacing:2px;margin-top:4px}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ov-bg);padding-top:var(--sat);padding-bottom:var(--sab)}
#ov.intro{background:var(--ov-intro-bg);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.ov-label{font-family:system-ui,-apple-system,sans-serif;font-size:10px;letter-spacing:3px;color:var(--ov-title);margin-bottom:8px;font-weight:500}
#ovScore{font-family:system-ui,-apple-system,sans-serif;font-size:64px;font-weight:600;color:var(--ov-score);letter-spacing:-2px;line-height:1;display:none}
#ovSub{font-family:system-ui,-apple-system,sans-serif;font-size:13px;color:var(--ov-sub);margin:12px 0 36px;text-align:center;line-height:1.7;max-width:200px}
#btn{font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:600;color:var(--btn-color);background:var(--btn-bg);border:0.5px solid var(--btn-border);border-radius:12px;padding:14px 44px;cursor:pointer;pointer-events:all;transition:opacity .15s,transform .1s;letter-spacing:.5px}
#btn:active{transform:scale(0.96);opacity:0.8}
#bestBadge{display:none;margin-bottom:12px;background:var(--badge-bg);border:0.5px solid var(--badge-border);border-radius:8px;padding:5px 18px;font-family:system-ui,-apple-system,sans-serif;font-size:10px;letter-spacing:2px;color:var(--badge-color);font-weight:600}
#adzone{position:absolute;bottom:0;left:0;width:100%;background:var(--ad-bg);border-top:0.5px solid var(--ad-border);padding:11px 0 calc(11px + var(--sab));display:none;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
#adzone .ad-label{font-family:system-ui,-apple-system,sans-serif;font-size:8px;letter-spacing:2px;color:var(--ad-text);font-weight:500}
#adzone .ad-box{font-family:system-ui,-apple-system,sans-serif;font-size:11px;color:var(--ad-text);background:var(--ad-box);border:0.5px solid var(--ad-box-border);border-radius:5px;padding:6px 28px}
</style>
</head>
<body>
<div id="wrap">
<canvas id="gc" width="360" height="600"></canvas>
<div id="hud">
  <div id="scoreEl">0</div>
  <div id="bestEl">BEST: 0</div>
  <div id="notifEl"></div>
  <div id="comboEl"></div>
  <div id="burstEl">
    <div id="burstTitle">3 IN A ROW!</div>
    <div id="burstSub">BLOKLAR BÜYÜDÜ</div>
  </div>
  <div id="ov" class="intro">
    <div class="ov-label" id="ovLabel">BLOCK STACK</div>
    <div id="ovScore">0</div>
    <div id="bestBadge">YENİ REKOR</div>
    <div id="ovSub">Bloğu tam zamanında bırak.<br>Ne kadar yükseğe çıkabilirsin?</div>
    <button id="btn">BAŞLA</button>
  </div>
  <div id="adzone">
    <div class="ad-label">REKLAM</div>
    <div class="ad-box">AdMob Banner — 320×50</div>
  </div>
</div>
</div>

<script>
/* ════════════════════════════════════════════════════
   ADMOB AYARLARI — Capacitor kurulumundan sonra
   bu iki ID'yi kendi panelinden alıp buraya yapıştır
   ════════════════════════════════════════════════════ */
// APP ID: ca-app-pub-6512468206139061~6649765876
const ADMOB_CONFIG = {
  // Android için gerçek ID örneği: ca-app-pub-XXXXXXXXXXXXXXXX/XXXXXXXXXX
  // Test sırasında aşağıdaki test ID'leri kullan:
  bannerAdUnitId:       'ca-app-pub-6512468206139061/8805155929',  // GERÇEK
  interstitialAdUnitId: 'ca-app-pub-6512468206139061/8805155929',  // GERÇEK
};

/* ── ADMOB KÖPRÜSÜ ───────────────────────────────────
   Capacitor + @capacitor-community/admob eklentisi
   yüklüyse gerçek reklamları çalıştırır.
   Yoksa (tarayıcıda test) simüle eder.
   ─────────────────────────────────────────────────── */
const AdMob = {
  _interstitialReady: false,
  _playCount: 0,           // her kaç oyunda bir interstitial göster
  AD_EVERY_N_GAMES: 2,     // her 2 oyunda bir reklam (ayarlayabilirsin)

  async init() {
    if (!window.Capacitor?.Plugins?.AdMob) return;
    try {
      await window.Capacitor.Plugins.AdMob.initialize({
        requestTrackingAuthorization: true,
        testingDevices: [],
        initializeForTesting: false,
      });
      this.prepareInterstitial();
    } catch(e) { console.warn('AdMob init:', e); }
  },

  async prepareInterstitial() {
    if (!window.Capacitor?.Plugins?.AdMob) return;
    try {
      await window.Capacitor.Plugins.AdMob.prepareInterstitial({
        adId: ADMOB_CONFIG.interstitialAdUnitId,
        isTesting: false,
      });
      this._interstitialReady = true;
    } catch(e) { console.warn('AdMob prepare:', e); }
  },

  async showInterstitial() {
    this._playCount++;
    // Her N oyunda bir göster
    if (this._playCount % this.AD_EVERY_N_GAMES !== 0) return;

    if (window.Capacitor?.Plugins?.AdMob && this._interstitialReady) {
      // Gerçek cihaz — AdMob interstitial göster
      try {
        await window.Capacitor.Plugins.AdMob.showInterstitial();
        this._interstitialReady = false;
        // Bir sonraki reklam için hazırla
        setTimeout(() => this.prepareInterstitial(), 1000);
      } catch(e) { console.warn('AdMob show:', e); }
    } else {
      // Tarayıcı / geliştirme ortamı — simüle et
      this._simulateAd();
    }
  },

  _simulateAd() {
    // Geliştirme sırasında reklam simülasyonu
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(0,0,0,0.92);
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;z-index:9999;font-family:system-ui,sans-serif;
    `;
    overlay.innerHTML = `
      <div style="color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:2px;margin-bottom:16px">REKLAM</div>
      <div style="width:300px;height:250px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;">
        <div style="text-align:center">
          <div style="color:rgba(255,255,255,0.5);font-size:13px">AdMob Interstitial</div>
          <div style="color:rgba(255,255,255,0.25);font-size:11px;margin-top:6px">300×250</div>
        </div>
      </div>
      <div id="adCountdown" style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:20px">5 saniye...</div>
      <button id="adClose" style="margin-top:12px;display:none;font-family:system-ui,sans-serif;font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.25);border-radius:8px;padding:10px 32px;cursor:pointer">Kapat</button>
    `;
    document.body.appendChild(overlay);

    let t = 5;
    const countdown = overlay.querySelector('#adCountdown');
    const closeBtn = overlay.querySelector('#adClose');
    const timer = setInterval(() => {
      t--;
      if (t > 0) {
        countdown.textContent = t + ' saniye...';
      } else {
        clearInterval(timer);
        countdown.style.display = 'none';
        closeBtn.style.display = 'block';
      }
    }, 1000);

    closeBtn.addEventListener('click', () => {
      document.body.removeChild(overlay);
      showGameOver(); // reklam kapandıktan sonra oyun sonu ekranı
    });
  }
};

/* ── SES MOTORU ─────────────────────────────────────── */
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(freq,type,dur,gain,delay){
  try{const ac=getAudio(),o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=type||'sine';
  o.frequency.setValueAtTime(freq,ac.currentTime+(delay||0));
  g.gain.setValueAtTime(gain||0.18,ac.currentTime+(delay||0));
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(delay||0)+dur);
  o.start(ac.currentTime+(delay||0));o.stop(ac.currentTime+(delay||0)+dur);}catch(e){}
}
const PENTA=[261,294,329,392,440,523,587,659,784,880];
function playStack(s){beep(PENTA[s%PENTA.length],'triangle',0.12,0.2);beep(PENTA[s%PENTA.length]*0.5,'sine',0.18,0.06);}
function playPerfect(){beep(660,'sine',0.15,0.22);beep(880,'sine',0.12,0.15,0.06);}
function playCombo(c){const b=440+c*20;beep(b,'sine',0.1,0.18);beep(b*1.25,'sine',0.1,0.15,0.08);beep(b*1.5,'sine',0.1,0.12,0.16);}
function playFiveRow(){beep(523,'sine',0.1,0.2,0);beep(659,'sine',0.1,0.2,0.1);beep(784,'sine',0.1,0.2,0.2);beep(1047,'sine',0.25,0.25,0.3);}
function playGameOver(){beep(300,'sawtooth',0.15,0.15,0);beep(200,'sawtooth',0.2,0.12,0.15);beep(120,'sawtooth',0.3,0.1,0.3);}

/* ── OYUN DEĞİŞKENLERİ ──────────────────────────────── */
const PERFECT_PX=5,FIVEROW_N=3,FIVEROW_GROW=0.12;
let W=360,H=600,BASE_BH=28,START_W=224;
const cv=document.getElementById('gc'),ctx=cv.getContext('2d');

function resize(){
  const wrap=document.getElementById('wrap');
  W=wrap.clientWidth;H=wrap.clientHeight;
  const dpr=window.devicePixelRatio||1;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const s=W/360;
  BASE_BH=Math.round(28*s);
  START_W=Math.round(224*s);
  if(state!=='play'){blockH=BASE_BH;initGame();mv=null;draw();}
}
const PALETTES=[
  {l:['#7B5EA7','#9B7EC8','#C4AEE8'],d:['#5B4FCF','#7B6FEF','#A99EF5']},
  {l:['#1A8A92','#22B5C0','#7DD8DF'],d:['#1A8A92','#22B5C0','#6ED4DB']},
  {l:['#C0392B','#E05544','#F0907A'],d:['#8B2222','#C03030','#E06060']},
  {l:['#1E6B3A','#27924E','#6DC28A'],d:['#1A5E32','#22853E','#5CBB7C']},
  {l:['#7A4800','#A86010','#D4943A'],d:['#8B4513','#B5601A','#D4843A']},
  {l:['#2C4F8A','#3A6DB5','#7AAAD8'],d:['#2C5F8A','#3A7DB5','#72AADA']},
  {l:['#7A2060','#A83080','#D470B0'],d:['#8B2272','#B530A0','#D870CC']},
  {l:['#3A5A3A','#527553','#88AA88'],d:['#2E4A2E','#427043','#72A072']},
];

function isDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches}
function getPalette(i){const p=PALETTES[i%PALETTES.length];return isDark()?p.d:p.l}

let blocks=[],mv=null,score=0,best=parseInt(localStorage.getItem('stBest')||'0');
let camY=0,tCamY=0,combo=0,state='idle',raf=null,particles=[];
let perfectStreak=0,blockH=BASE_BH,notifTimer=0,comboTimer=0,burstTimer=0,burstParticles=[];
let pendingGameOver=false; // reklam gösterilirken oyun sonu ekranını beklet

document.getElementById('bestEl').textContent='BEST: '+best;

function rnd(a,b){return Math.random()*(b-a)+a}
function spawnParticles(x,y,w,color,n){for(let i=0;i<(n||10);i++)particles.push({x:x+rnd(0,w),y,vx:rnd(-2.5,2.5),vy:rnd(-3.5,-0.5),a:1,color,r:rnd(1.5,3)});}
function spawnBurstParticles(){const cols=['#FFB830','#FFD060','#FF8C00','#FFF0A0','#FF6600'];for(let i=0;i<60;i++){const a=rnd(0,Math.PI*2),s=rnd(2,8);burstParticles.push({x:W/2,y:H/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,a:1,color:cols[Math.floor(rnd(0,cols.length))],r:rnd(2,5)});}}

function initGame(){
  blocks=[];particles=[];burstParticles=[];score=0;combo=0;perfectStreak=0;blockH=BASE_BH;
  camY=0;tCamY=0;notifTimer=0;comboTimer=0;burstTimer=0;pendingGameOver=false;
  const bx=(W-START_W)/2;
  for(let i=0;i<4;i++)blocks.push({x:bx,y:H-70-i*blockH,w:START_W,h:blockH,pi:0});
  spawnMv();
  document.getElementById('scoreEl').textContent='0';
  document.getElementById('notifEl').style.opacity='0';
  document.getElementById('comboEl').style.opacity='0';
  document.getElementById('burstEl').style.opacity='0';
}

function spawnMv(){
  const last=blocks[blocks.length-1];
  const pi=score%PALETTES.length,dir=Math.random()<0.5?1:-1,spd=Math.min(2.5+score*0.065,7.5);
  mv={x:dir>0?-last.w:W,y:last.y-blockH,w:last.w,h:blockH,dir,spd,pi};
}

function showNotif(msg,color,dur){
  const el=document.getElementById('notifEl');
  el.textContent=msg;el.style.color=color;el.style.opacity='1';notifTimer=dur||42;
}

function growBlocks(){
  const newH=Math.round(blockH*(1+FIVEROW_GROW)),diff=newH-blockH;
  for(let i=0;i<blocks.length;i++){blocks[i].h=newH;blocks[i].y-=diff*(blocks.length-1-i);}
  tCamY+=diff*(blocks.length-1);blockH=newH;
}

function drop(){
  if(!mv)return;
  const last=blocks[blocks.length-1];
  const left=Math.max(mv.x,last.x),right=Math.min(mv.x+mv.w,last.x+last.w),overlap=right-left;
  if(overlap<=2){playGameOver();triggerGameOver();return;}
  const isPerfect=Math.abs(overlap-last.w)<PERFECT_PX;
  let nx,nw;
  if(isPerfect){
    nx=last.x;nw=last.w;combo++;perfectStreak++;
    spawnParticles(nx,mv.y+Math.round(camY),nw,getPalette(mv.pi)[1],10);
    if(perfectStreak>=FIVEROW_N&&perfectStreak%FIVEROW_N===0){
      growBlocks();spawnBurstParticles();burstTimer=90;
      document.getElementById('burstEl').style.opacity='1';
      setTimeout(()=>document.getElementById('burstEl').style.opacity='0',1200);
      playFiveRow();
    } else {
      playPerfect();
      showNotif('PERFECT!',isDark()?'#FFE566':'#7B5EA7',42);
      if(combo>1){playCombo(combo);document.getElementById('comboEl').textContent=combo+'× COMBO';document.getElementById('comboEl').style.opacity='1';comboTimer=60;}
    }
  } else {
    nx=left;nw=overlap;combo=0;perfectStreak=0;playStack(score);
  }
  blocks.push({x:nx,y:mv.y,w:nw,h:blockH,pi:mv.pi});
  score++;
  document.getElementById('scoreEl').textContent=score;
  tCamY+=blockH;spawnMv();
}

/* Oyun bitince önce reklam, sonra game over ekranı */
async function triggerGameOver(){
  state='dead';mv=null;
  // Skoru ve best'i hemen güncelle
  const isNew=score>best;
  if(isNew){best=score;localStorage.setItem('stBest',best);document.getElementById('bestEl').textContent='BEST: '+best;}
  // Önce interstitial göster (varsa — her 2 oyunda bir)
  await AdMob.showInterstitial();
  // Eğer simülasyon değilse (gerçek cihaz) direkt game over ekranını göster
  // Simülasyonda showGameOver, overlay kapanınca çağrılır
  if(window.Capacitor?.Plugins?.AdMob){
    showGameOver();
  }
  // Simülasyon durumunda showGameOver AdMob._simulateAd içinden çağrılır
}

function showGameOver(){
  const isNew=score>=best;
  const ov=document.getElementById('ov');
  ov.classList.remove('intro');
  ov.style.display='flex';
  document.getElementById('ovLabel').textContent='OYUN BİTTİ';
  document.getElementById('ovScore').style.display='block';
  document.getElementById('ovScore').textContent=score;
  document.getElementById('ovSub').textContent=isNew&&score>0?'Yeni rekor kırdın! 🎉':'Tekrar dene, daha iyisini yapabilirsin.';
  document.getElementById('bestBadge').style.display=isNew&&score>0?'block':'none';
  document.getElementById('btn').textContent='TEKRAR OYNA';
  document.getElementById('adzone').style.display='flex';
}

/* ── RENDER ─────────────────────────────────────────── */
function getBg(){return isDark()?{top:'#080514',bot:'#0E0A20',grid:'rgba(255,255,255,0.025)',floor:'rgba(8,5,20,0.55)'}:{top:'#F5F2ED',bot:'#E8E4DC',grid:'rgba(0,0,0,0.04)',floor:'rgba(240,237,232,0.65)'};}
function drawBg(){const{top,bot,grid}=getBg(),g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,top);g.addColorStop(1,bot);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.strokeStyle=grid;ctx.lineWidth=1;for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}}
function drawBlock(b,cy){const sy=b.y+cy;if(sy>H+b.h||sy<-b.h*3)return;const[dark,mid,light]=getPalette(b.pi);ctx.fillStyle=dark;ctx.beginPath();ctx.roundRect(b.x+1,sy+1,b.w-2,b.h-2,4);ctx.fill();ctx.fillStyle=mid;ctx.beginPath();ctx.roundRect(b.x+1,sy+1,b.w-2,Math.floor(b.h*0.45),4);ctx.fill();ctx.fillStyle=light;ctx.beginPath();ctx.roundRect(b.x+3,sy+3,Math.min(b.w-8,32),4,2);ctx.fill();ctx.fillStyle=isDark()?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';ctx.fillRect(b.x+1,sy+Math.floor(b.h*0.45),b.w-2,1);}
function drawParticles(cy){particles.forEach(p=>{ctx.globalAlpha=p.a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y+cy,p.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}
function drawBurst(){burstParticles.forEach(p=>{ctx.globalAlpha=p.a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}
function drawGuide(cy){if(!blocks.length)return;const last=blocks[blocks.length-1];ctx.strokeStyle=isDark()?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.08)';ctx.setLineDash([3,5]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(last.x,last.y+cy);ctx.lineTo(last.x,0);ctx.stroke();ctx.beginPath();ctx.moveTo(last.x+last.w,last.y+cy);ctx.lineTo(last.x+last.w,0);ctx.stroke();ctx.setLineDash([]);}
function drawStreakDots(){const dk=isDark(),dotR=4,gap=10,totalW=FIVEROW_N*(dotR*2)+(FIVEROW_N-1)*gap,startX=(W-totalW)/2,y=H-28;for(let i=0;i<FIVEROW_N;i++){const filled=i<(perfectStreak%FIVEROW_N)||(perfectStreak>0&&perfectStreak%FIVEROW_N===0);ctx.beginPath();ctx.arc(startX+dotR+i*(dotR*2+gap),y,dotR,0,Math.PI*2);if(filled){ctx.fillStyle=dk?'#FFB830':'#E8A020';ctx.fill();}else{ctx.strokeStyle=dk?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.stroke();}}}

function update(){
  camY+=(tCamY-camY)*0.1;
  if(mv){mv.x+=mv.dir*mv.spd;if(mv.x>W+12)mv.dir=-1;if(mv.x<-mv.w-12)mv.dir=1;}
  particles=particles.filter(p=>p.a>0.04);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.a*=0.87;});
  if(burstTimer>0){burstTimer--;burstParticles=burstParticles.filter(p=>p.a>0.03);burstParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.vx*=0.97;p.a*=0.94;});}
  if(notifTimer-->0)document.getElementById('notifEl').style.opacity=notifTimer>0?'1':'0';
  if(comboTimer-->0)document.getElementById('comboEl').style.opacity=comboTimer>0?'1':'0';
}

function draw(){
  ctx.clearRect(0,0,W,H);drawBg();
  const cy=Math.round(camY);
  drawGuide(cy);blocks.forEach(b=>drawBlock(b,cy));
  if(mv)drawBlock(mv,cy);
  drawParticles(cy);if(burstTimer>0)drawBurst();
  const{floor}=getBg();ctx.fillStyle=floor;ctx.fillRect(0,H-52,W,52);
  if(state==='play')drawStreakDots();
}

function loop(){if(state==='play'){update();draw();raf=requestAnimationFrame(loop);}else draw();}

/* ── BAŞLAT ─────────────────────────────────────────── */
document.getElementById('btn').addEventListener('click',()=>{
  getAudio();
  state='play';
  const ov=document.getElementById('ov');
  ov.classList.remove('intro');
  ov.style.display='none';
  document.getElementById('adzone').style.display='none';
  document.getElementById('ovScore').style.display='none';
  document.getElementById('bestBadge').style.display='none';
  initGame();if(raf)cancelAnimationFrame(raf);loop();
});
cv.addEventListener('click',()=>{if(state==='play')drop();});
cv.addEventListener('touchstart',e=>{e.preventDefault();if(state==='play')drop();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&state==='play'){e.preventDefault();drop();}});
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(state!=='play')draw();});

// Native bridge — StatusBar + SplashScreen + AdMob (Capacitor yüklüyse)
(async () => {
  const Plugins = window.Capacitor?.Plugins;
  if (Plugins?.StatusBar) {
    try {
      const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
      await Plugins.StatusBar.setStyle({ style: dark ? 'DARK' : 'LIGHT' });
      await Plugins.StatusBar.setBackgroundColor({ color: dark ? '#080514' : '#F0EDE8' });
    } catch(e) { console.warn('StatusBar:', e); }
  }
  AdMob.init();
  if (Plugins?.SplashScreen) {
    try { await Plugins.SplashScreen.hide(); } catch(e) {}
  }
})();
window.addEventListener('resize',()=>{if(state!=='play')resize();});
resize();
</script>
