<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#F8F5F0"/>
      <stop offset="100%" stop-color="#E5E0D6"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="5" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with subtle vignette -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Bottom block: Bronze, widest (foundation), centered -->
  <g filter="url(#shadow)">
    <rect x="232" y="666" width="560" height="104" rx="14" fill="#7A4800"/>
    <rect x="232" y="666" width="560" height="47" rx="14" fill="#A86010"/>
    <rect x="232" y="709" width="560" height="2" fill="rgba(0,0,0,0.08)"/>
    <rect x="250" y="682" width="84" height="9" rx="3" fill="#D4943A"/>
  </g>

  <!-- Block 4: Forest, slight right offset -->
  <g filter="url(#shadow)">
    <rect x="247" y="554" width="540" height="104" rx="14" fill="#1E6B3A"/>
    <rect x="247" y="554" width="540" height="47" rx="14" fill="#27924E"/>
    <rect x="247" y="597" width="540" height="2" fill="rgba(0,0,0,0.08)"/>
    <rect x="265" y="570" width="84" height="9" rx="3" fill="#6DC28A"/>
  </g>

  <!-- Block 3: Coral, slight left offset -->
  <g filter="url(#shadow)">
    <rect x="248" y="442" width="520" height="104" rx="14" fill="#C0392B"/>
    <rect x="248" y="442" width="520" height="47" rx="14" fill="#E05544"/>
    <rect x="248" y="485" width="520" height="2" fill="rgba(0,0,0,0.08)"/>
    <rect x="266" y="458" width="84" height="9" rx="3" fill="#F0907A"/>
  </g>

  <!-- Block 2: Teal, slight right offset -->
  <g filter="url(#shadow)">
    <rect x="268" y="330" width="500" height="104" rx="14" fill="#1A8A92"/>
    <rect x="268" y="330" width="500" height="47" rx="14" fill="#22B5C0"/>
    <rect x="268" y="373" width="500" height="2" fill="rgba(0,0,0,0.08)"/>
    <rect x="286" y="346" width="84" height="9" rx="3" fill="#7DD8DF"/>
  </g>

  <!-- Top block: Lavender, narrowest (most recent), slight left offset -->
  <g filter="url(#shadow)">
    <rect x="274" y="218" width="460" height="104" rx="14" fill="#7B5EA7"/>
    <rect x="274" y="218" width="460" height="47" rx="14" fill="#9B7EC8"/>
    <rect x="274" y="261" width="460" height="2" fill="rgba(0,0,0,0.08)"/>
    <rect x="292" y="234" width="84" height="9" rx="3" fill="#C4AEE8"/>
  </g>
</svg>
