<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Stack — Minimalist Block Stacking Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F0EDE8;color:#1A1A1A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
@media(prefers-color-scheme:dark){body{background:#0E0A20;color:#F0EDE8}}
.icon{width:160px;height:160px;margin-bottom:32px;border-radius:36px;box-shadow:0 12px 40px rgba(0,0,0,0.15)}
h1{font-size:42px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
.tagline{font-size:18px;opacity:0.7;margin-bottom:48px;max-width:480px;line-height:1.5}
.links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:48px}
.links a{font-size:14px;font-weight:500;color:#7B5EA7;text-decoration:none;padding:12px 24px;border-radius:12px;background:rgba(123,94,167,0.1);transition:opacity .15s}
@media(prefers-color-scheme:dark){.links a{color:#9B7EC8;background:rgba(155,126,200,0.15)}}
.links a:hover{opacity:0.7}
.footer{font-size:12px;opacity:0.5;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>
<img src="icon.png" alt="Block Stack" class="icon">
<h1>Block Stack</h1>
<div class="tagline">Bloğu tam zamanında bırak. Ne kadar yükseğe çıkabilirsin?</div>
<div class="links">

</div>
<div class="footer">© 2026 zeynepalbayrak</div>
</body>
</html>
